<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chirplet</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-state="disconnected" data-mood="neutral" data-mouth="closed" data-action="idle">
    <main class="shell">
      <section class="stage">
        <div class="ambient ambient-left"></div>
        <div class="ambient ambient-right"></div>

        <div class="avatar-card">
          <div class="avatar-frame">
            <div class="signal-ring"></div>
            <div class="avatar" role="img" aria-label="Chirplet avatar">
              <div class="face-grid"></div>
              <div class="eyes">
                <span class="eye eye-left"></span>
                <span class="eye eye-right"></span>
              </div>
              <div class="mouth-wrap">
                <span class="mouth"></span>
              </div>
            </div>
          </div>

          <p id="spoken-text" class="spoken-text" role="status" aria-live="polite"></p>
          <p id="status-line" class="status-line" role="status" aria-live="polite">Preparing Chirplet...</p>

          <button id="talk-button" class="talk-button" type="button">
            Hold to Talk
          </button>

          <p class="tts-hint">or press spacebar</p>
        </div>
      </section>

      <details class="debug-panel">
        <summary>Debug</summary>

        <div class="debug-grid">
          <label class="debug-field" for="manual-input">
            <span>Manual text</span>
            <input id="manual-input" type="text" maxlength="500" placeholder="Type a message if your browser does not support speech">
          </label>

          <button id="manual-send" class="ghost-button" type="button">Send</button>

          <label class="debug-field" for="voice-select">
            <span>TTS voice</span>
            <select id="voice-select" disabled>
              <option value="">(browser default)</option>
            </select>
          </label>

          <div class="debug-sessions">
            <div class="debug-sessions-header">
              <span class="debug-field-label">Sessions</span>
              <button id="sessions-refresh" class="ghost-button" type="button">Refresh</button>
            </div>
            <select id="sessions-list" size="5" aria-label="Saved sessions">
              <option value="">(no sessions loaded)</option>
            </select>
            <pre id="sessions-turns" class="debug-log" aria-label="Session turns"></pre>
          </div>

          <pre id="debug-log" class="debug-log"></pre>
        </div>
      </details>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
