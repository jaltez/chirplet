services:
  chirplet:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_PATH=data/chirplet.db
    restart: unless-stopped

