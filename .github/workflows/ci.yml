name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Lint
        run: make lint

      - name: Verify JSON-Schema is in sync
        run: |
          python tools/generate_schema.py > /tmp/regen.json
          diff -u packages/contracts/assistant-turn.schema.json /tmp/regen.json

      - name: Run tests with 100% coverage floor
        run: make test-cov
